name: CI - Unit Tests

# Runs the app's unit tests on GitHub's runners (no local machine/disk needed).
# Verifies the SillyTavern-parity work (character cards, world info, personas,
# author's note, macros, greeting swipes, group-chat engine, PNG export).

on:
  push:
  workflow_dispatch:

jobs:
  unit-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform 37 (best effort)
        run: yes | sdkmanager "platforms;android-37" "build-tools;35.0.0" || true

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: web-ui/pnpm-lock.yaml

      - name: Install web-ui dependencies
        working-directory: web-ui
        run: pnpm install --frozen-lockfile

      - name: Gradle cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Provide google-services.json
        # Unit tests don't contact Firebase; a placeholder satisfies the
        # google-services plugin so :app can compile. If a real
        # GOOGLE_SERVICES_JSON secret exists it is used instead.
        run: |
          if [ -n "${{ secrets.GOOGLE_SERVICES_JSON }}" ]; then
            printf '%s' '${{ secrets.GOOGLE_SERVICES_JSON }}' > app/google-services.json
            echo "Used GOOGLE_SERVICES_JSON secret."
          else
            printf '%s' '{"project_info":{"project_number":"000000000000","project_id":"rikkahub-ci","storage_bucket":"rikkahub-ci.appspot.com"},"client":[{"client_info":{"mobilesdk_app_id":"1:000000000000:android:0000000000000000aaaaaa","android_client_info":{"package_name":"me.rerere.rikkahub.st"}},"oauth_client":[],"api_key":[{"current_key":"AIzaSyA0000000000000000000000000000000"}],"services":{"appinvite_service":{"other_platform_oauth_client":[]}}},{"client_info":{"mobilesdk_app_id":"1:000000000000:android:1111111111111111bbbbbb","android_client_info":{"package_name":"me.rerere.rikkahub.st.debug"}},"oauth_client":[],"api_key":[{"current_key":"AIzaSyA0000000000000000000000000000000"}],"services":{"appinvite_service":{"other_platform_oauth_client":[]}}}],"configuration_version":"1"}' > app/google-services.json
            echo "Used placeholder google-services.json."
          fi

      - name: Run unit tests
        # Compiles the whole :app module (verifies all new UI/model code builds),
        # then runs the SillyTavern-parity test suites. Pre-existing, locale/timezone
        # -dependent tests (TimeReminderTransformerTest, ShareSheetTest) are not part
        # of this change and are excluded from this scoped verification.
        run: |
          chmod +x gradlew
          ./gradlew :app:testDebugUnitTest --stacktrace \
            --tests "me.rerere.rikkahub.data.ai.transformers.ParametricMacroTest" \
            --tests "me.rerere.rikkahub.data.ai.transformers.AuthorsNoteTransformerTest" \
            --tests "me.rerere.rikkahub.data.ai.transformers.WorldInfoSelectionTest" \
            --tests "me.rerere.rikkahub.data.ai.transformers.WorldInfoRecursionTest" \
            --tests "me.rerere.rikkahub.data.ai.transformers.WorldInfoBudgetTest" \
            --tests "me.rerere.rikkahub.data.model.WorldInfoActivationTest" \
            --tests "me.rerere.rikkahub.data.model.GroupActivationTest" \
            --tests "me.rerere.rikkahub.data.model.GroupResponderPlanningTest" \
            --tests "me.rerere.rikkahub.data.model.GroupGreetingNodesTest" \
            --tests "me.rerere.rikkahub.data.model.InitialMessageNodesTest" \
            --tests "me.rerere.rikkahub.data.export.CharacterCardExporterTest" \
            --tests "me.rerere.rikkahub.data.export.LorebookSerializerTest" \
            --tests "me.rerere.rikkahub.utils.PngTextChunkTest" \
            --tests "me.rerere.rikkahub.data.ai.PromptManagerAssemblerTest" \
            --tests "me.rerere.rikkahub.data.model.PromptPresetParserTest" \
            --tests "me.rerere.rikkahub.data.ai.transformers.PromptManagerIntegrationTest" \
            --tests "me.rerere.rikkahub.data.model.TextCompletionPresetParserTest" \
            --tests "me.rerere.rikkahub.data.model.SillyTavernRegexParserTest" \
            --tests "me.rerere.rikkahub.data.ai.TextCompletionPromptAssemblerTest" \
            --tests "me.rerere.rikkahub.data.ai.transformers.TextCompletionPresetIntegrationTest"

      - name: Build debug APK
        run: ./gradlew :app:assembleDebug --stacktrace

      - name: Upload debug APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: rikkahub-st-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-report
          path: |
            app/build/reports/tests/
            app/build/test-results/

  smoke-test:
    # Real runtime verification: install the built APK on an emulator, launch the
    # app, and fail if it crashes on startup (also catches the placeholder-Firebase
    # case). Uses the APK from unit-tests (no rebuild).
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4

      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: rikkahub-st-debug-apk
          path: apk

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Launch on emulator and verify no crash
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: bash .github/smoke.sh
