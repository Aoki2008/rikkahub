name: Release Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Gradle cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}

      - name: Prepare build files
        run: |
          # 解码base64编码的keystore文件
          echo "${{ secrets.KEY_BASE64 }}" | base64 -d > app/app.key
          
          # 写入签名配置到local.properties
          echo "${{ secrets.SIGNING_CONFIG }}" > local.properties
          
          # 写入Google Services配置
          echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > app/google-services.json

      - name: Gradle Build
        run: |
          chmod +x gradlew
          ./gradlew :app:assembleRelease

      - name: Upload release APK (arm64-v8a)
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: rikkahub-st-release-arm64-v8a-apk
          path: app/build/outputs/apk/release/*arm64-v8a*.apk
          compression-level: 0
          if-no-files-found: error

      - name: Upload release APK (x86_64)
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: rikkahub-st-release-x86_64-apk
          path: app/build/outputs/apk/release/*x86_64*.apk
          compression-level: 0
          if-no-files-found: error

      - name: Upload release APK (universal)
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: rikkahub-st-release-universal-apk
          path: app/build/outputs/apk/release/*universal*.apk
          compression-level: 0
          if-no-files-found: error
